<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="research-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#292a2a" />
      <stop offset="100%" stop-color="#8e9192" />
    </linearGradient>
    <pattern id="research-pattern" width="42" height="42" patternUnits="userSpaceOnUse"><circle cx="6" cy="6" r="2.4" fill="white" fill-opacity="0.4" /></pattern>
    <filter id="research-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" /></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#research-gradient)" />
  <rect width="1200" height="630" fill="url(#research-pattern)" />
  <rect width="1200" height="630" filter="url(#research-grain)" opacity="0.06" style="mix-blend-mode:overlay" />
  <text x="80" y="500" font-family="monospace" font-size="40" fill="#e6e9ef" opacity="0.85">vishal@tyagi</text>
  <text x="80" y="560" font-family="sans-serif" font-size="56" font-weight="700" fill="#ffffff">Research</text>
</svg>