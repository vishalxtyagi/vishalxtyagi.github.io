<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="product-analytics-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2333" />
      <stop offset="100%" stop-color="#5b7a99" />
    </linearGradient>
    <pattern id="product-analytics-pattern" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M0 0H60M0 0V60" stroke="white" stroke-opacity="0.38" stroke-width="1.5" /></pattern>
    <filter id="product-analytics-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" /></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#product-analytics-gradient)" />
  <rect width="1200" height="630" fill="url(#product-analytics-pattern)" />
  <rect width="1200" height="630" filter="url(#product-analytics-grain)" opacity="0.06" style="mix-blend-mode:overlay" />
  <text x="80" y="500" font-family="monospace" font-size="40" fill="#e6e9ef" opacity="0.85">vishal@tyagi</text>
  <text x="80" y="560" font-family="sans-serif" font-size="56" font-weight="700" fill="#ffffff">Product Analytics</text>
</svg>